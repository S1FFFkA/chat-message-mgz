syntax = "proto3";

package chat.v1;

option go_package = "gitlab.com/siffka/chat-message-mgz/pkg/api/chat/v1;chatv1";

import "google/protobuf/timestamp.proto";

enum MessageStatus {
  MESSAGE_STATUS_UNSPECIFIED = 0;
  MESSAGE_STATUS_SENT = 1;
  MESSAGE_STATUS_DELIVERED = 2;
  MESSAGE_STATUS_READ = 3;
}

message Chat {
  string id = 1;
  string user1_id = 2;
  string user2_id = 3;
  google.protobuf.Timestamp created_at = 4;
}

message Message {
  int64 id = 1; // Message id unique inside chat.
  string chat_id = 2;
  string sender_user_id = 3;
  string text = 4;
  MessageStatus status = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateDirectChatRequest {
  string user1_id = 1;
  string user2_id = 2;
}

message CreateDirectChatResponse {
  Chat chat = 1;
}

message DeleteChatRequest {
  string chat_id = 1;
}

message DeleteChatResponse {}

message CreateMessageRequest {
  string chat_id = 1;
  string sender_user_id = 2;
  string text = 3;
}

message CreateMessageResponse {
  Message message = 1;
}

message SendMessageRequest {
  string chat_id = 1;
  string sender_user_id = 2;
  string text = 3;
  string client_message_id = 4; // Optional idempotency key from client.
}

message SendMessageResponse {
  Message message = 1;
}

message UpdateMessageStatusRequest {
  string chat_id = 1;
  int64 message_id = 2;
  MessageStatus status = 3;
}

message UpdateMessageStatusResponse {
  Message message = 1;
}

message GetChatPreviewRequest {
  string chat_id = 1;
}

message ChatPreview {
  string chat_id = 1;
  string other_user_id = 2; // The other participant in this direct chat.
  Message last_message = 3;
  google.protobuf.Timestamp last_message_at = 4;
  int64 unread_count = 5;
}

message GetChatPreviewResponse {
  ChatPreview preview = 1;
}

message GetLastMessagesRequest {
  string chat_id = 1;
  int32 limit = 2; // If zero, server uses default = 50.
  int64 before_message_id = 3; // If zero, server starts from the latest messages.
}

message GetLastMessagesResponse {
  repeated Message messages = 1;
  bool has_more = 2;
}

message ListUserChatsRequest {
  string user_id = 1;
  int32 limit = 2;  // If zero, server uses default = 15.
  int32 offset = 3; // Simple pagination for MVP.
}

message ListUserChatsResponse {
  repeated ChatPreview chats = 1;
}

message MarkChatReadRequest {
  string chat_id = 1;
  string user_id = 2;
  int64 up_to_message_id = 3; // If zero, server marks up to the latest message.
}

message MarkChatReadResponse {
  int64 updated_messages = 1;
}

service ChatMessageService {
  rpc CreateDirectChat(CreateDirectChatRequest) returns (CreateDirectChatResponse);
  rpc DeleteChat(DeleteChatRequest) returns (DeleteChatResponse);
  rpc CreateMessage(CreateMessageRequest) returns (CreateMessageResponse);
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc UpdateMessageStatus(UpdateMessageStatusRequest) returns (UpdateMessageStatusResponse);
  rpc GetChatPreview(GetChatPreviewRequest) returns (GetChatPreviewResponse);
  rpc GetLastMessages(GetLastMessagesRequest) returns (GetLastMessagesResponse);
  rpc ListUserChats(ListUserChatsRequest) returns (ListUserChatsResponse);
  rpc MarkChatRead(MarkChatReadRequest) returns (MarkChatReadResponse);
}
     